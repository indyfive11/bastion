# bastion edge IP-forwarding — rendered by `bastion generate` (EDGE MODE ONLY).
# A router passes traffic BETWEEN networks; the Linux kernel only does that when these
# switches are on. Without them the edge forward chain (LAN<->WAN, LAN<->tunnels, and the
# IPv6 forward rules) is INERT — the kernel drops forwarded packets before the rules apply.
# Endpoints never forward (defense-in-depth), so this file is not written in endpoint mode.

net.ipv4.ip_forward = 1
{{ network.ipv6_forward_block }}
