# bastion AI backend config — pluggable analyzer backend for the edge firewall.
#
# PROVIDER-AGNOSTIC CONTRACT: the backend is just a PROCESS.
#   stdin  = sanitized signals JSON
#   stdout = intent-envelope JSON (must match the intent schema)
#   exit 0 = success;  non-zero = error (analyzer keeps the old spool, self-heals via TTL)
# Swap providers by pointing BACKEND_CMD at ANY executable implementing that contract.
# Nothing else in the system imports a vendor SDK.

# Backend command. Default = Claude (Messages API via urllib, no SDK).
# Offline/agnosticism test:  BACKEND_CMD=/usr/local/sbin/edge-ai-backend-mock
BACKEND_CMD={{ ai.backend_cmd }}

# Model for the claude backend (other backends ignore this).
MODEL={{ ai.model }}

# Safety bounds the ANALYZER enforces (defense-in-depth; the reconciler re-clamps below this).
MAX_INTENTS={{ ai.max_intents }}
MAX_TTL=86400
MIN_TTL=60

# Seconds to wait for the backend command before giving up.
BACKEND_TIMEOUT=60
