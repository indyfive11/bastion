# bastion local validating resolver (unbound) — the "local stub" DNS option.
# Runs on 127.0.0.1:5335 as a DNSSEC-validating recursive resolver that dnsmasq
# forwards to (set `server=127.0.0.1#5335` in dnsmasq.conf). See docs/options/dns-options.md.
# No machine-specific values: this template is topology-independent.

server:
    verbosity: 0
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only the local host (dnsmasq) may query this resolver.
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Privacy / hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    qname-minimisation: yes

    prefetch: yes
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # Don't forward RFC1918 reverse lookups to the public internet.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 100.64.0.0/10

# DNS sinkhole (ads/trackers/malware) — generated by edge-dnsblock-update (L4 dnsblock).
# The include is tolerant: unbound starts fine before the first generation run.
include: "/etc/unbound/blocklist.conf"
