# bastion local validating resolver (unbound) — the "local stub" DNS option.
# A DNSSEC-validating recursive resolver on 127.0.0.1:5335 that dnsmasq forwards to
# (set `server=127.0.0.1#5335` in dnsmasq.conf). See docs/options/dns-options.md.
# No machine-specific values: this template is topology-independent (fully static).

server:
    verbosity: 0
    interface: 127.0.0.1@5335
    # Listening on ::1 too is harmless (access-control still refuses all but loopback). Drop this
    # line on a host with IPv6 fully disabled (net.ipv6.conf.all.disable_ipv6=1), where the bind
    # would fail and unbound would not start; do-ip6 below is independent (it governs recursion).
    interface: ::1@5335
    port: 5335
    do-ip4: yes
    # do-ip6: yes lets RECURSION reach IPv6-only authoritative nameservers (an increasing share of
    # zones) — independent of what the LAN runs. Without it those names silently fail to resolve.
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Only the local host (dnsmasq) may query this resolver.
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow

    # Run as the unbound package's service user; do NOT chroot — the distro systemd unit sandboxes
    # the daemon instead (ProtectSystem/PrivateDevices/SystemCallFilter), and chroot would only get
    # in the way of the RFC5011 anchor refresh + recursion.
    username: "unbound"
    directory: "/etc/unbound"
    chroot: ""
    pidfile: ""             # systemd tracks the process; no pidfile to write under the strict sandbox
    use-syslog: yes
    log-queries: no

    # DNSSEC validation: RFC5011-managed root trust anchor at /var/lib/unbound/root.key. The L4
    # layer seeds it with `unbound-anchor` before unbound first starts and ships an unbound.service
    # drop-in so the unbound user can write it for auto-refresh (see l4_dns_dhcp.py UNBOUND_DROPIN).
    # Without this directive unbound does NOT validate.
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    val-clean-additional: yes
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    aggressive-nsec: yes

    # Privacy / hardening
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    use-caps-for-id: yes
    rrset-roundrobin: yes
    minimal-responses: yes
    deny-any: yes

    # Don't forward RFC1918 / CGNAT / link-local / ULA reverse lookups to the public internet.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 100.64.0.0/10
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # Performance
    num-threads: 2
    so-reuseport: yes
    msg-cache-size: 64m
    rrset-cache-size: 128m
    cache-min-ttl: 60
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 3600

# DNS sinkhole (ads/trackers/malware) — generated by edge-dnsblock-update (L4 dnsblock).
# The include is tolerant: unbound starts fine before the first generation run.
include: "/etc/unbound/blocklist.conf"
