# bastion edge LAN DNS + DHCP (dnsmasq). Edge mode only.
# Lets the node serve DHCP/DNS for the LAN so an upstream router can become disposable.
# Scope: IPv4. IPv6 RA/DNS is left to the existing router unless separately configured.
# Values in {{ }} are resolved from machine.conf at generate time.

## ---- Interfaces / binding ----
interface={{ interfaces.lan }}        # LAN only
interface=lo
except-interface={{ interfaces.wan }} # NEVER serve on the WAN port
bind-dynamic                          # bind only listed ifaces; don't auto-grab new ones
local-service                         # only answer queries arriving from local subnets

## ---- Resolver hygiene ----
no-resolv                             # ignore /etc/resolv.conf for upstreams (avoids loop)
domain-needed                         # don't forward bare unqualified names
bogus-priv                            # don't forward reverse lookups for RFC1918 space
cache-size=1000
localise-queries                      # return subnet-appropriate A record
stop-dns-rebind                       # rebind protection
rebind-localhost-ok

## ---- Upstream resolver ----
# Set ONE upstream. See docs/options/dns-options.md for the option categories
# (local stub, public plaintext, public DoT, private encrypted). machine.conf carries
# the chosen value; the wizard writes it here.
server={{ network.dns_upstream }}

## ---- Local domain ----
domain=lan
expand-hosts

## ---- DHCP (IPv4) ----
dhcp-authoritative                    # this node is the SOLE DHCP server (router DHCP must be OFF)
read-ethers                           # honor /etc/ethers reservations
dhcp-range={{ network.dhcp_range_start }},{{ network.dhcp_range_end }},{{ network.dhcp_lease }}
dhcp-option=option:router,{{ network.lan_ip }}      # gateway advertised to clients = this node
dhcp-option=option:dns-server,{{ network.lan_ip }}  # DNS advertised to clients = this node

## ---- Local drop-ins ----
# Read operator-supplied additions from /etc/dnsmasq.d/*.conf. This is where machine-specific
# DHCP reservations go — pin a host to a stable IP with a line of the form:
#   dhcp-host=<MAC>,<IP>,<name>
# in e.g. /etc/dnsmasq.d/reservations.conf. Reservations carry MACs (installation-specific) so
# they are NEVER shipped in this managed template or in the repo — they live only in the drop-in.
conf-dir=/etc/dnsmasq.d/,*.conf

## ---- Logging ----
log-dhcp
#log-queries
proxy-dnssec
